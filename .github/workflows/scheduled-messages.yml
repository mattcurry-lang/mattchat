name: Send Scheduled Messages

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Test network
        run: curl -v https://google.com

      - name: Trigger edge function
        env:
          ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -v -X POST \
            "https://bqerkvywgxoiocbkxif.supabase.co/functions/v1/send-scheduled-messages" \
            -H "Authorization: Bearer $ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{"trigger":"cron"}'
