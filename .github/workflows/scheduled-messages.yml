name: Send Scheduled Messages

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger edge function
        run: curl -s -X POST "https://bqerkvywgxoiocbkxif.supabase.co/functions/v1/send-scheduled-messages" -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" -H "Content-Type: application/json" -d '{"trigger":"cron"}'
